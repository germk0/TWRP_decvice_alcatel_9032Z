name: Compilador de TWRP en la Nube

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Maximizar espacio en el Servidor Virtual
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 6144
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Configurar Entorno de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Instalar herramienta Repo de Google
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH

    - name: Descargar Base Minimal de TWRP (Android 10)
      run: |
        PATH=~/bin:$PATH
        mkdir twrp
        cd twrp
        git config --global user.name "usr1"
        git config --global user.email "usr1@tablet.local"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-10.0
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Inyectar nuestro Árbol de Dispositivos
      uses: actions/checkout@v4
      with:
        path: twrp/device/alcatel/9032Z

    - name: Ejecutar Compilación Ejecutiva
      run: |
        PATH=~/bin:$PATH
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_9032Z-eng
        make recoveryimage -j$(nproc --all)

    - name: Subir el archivo RECOVERY.IMG Terminado
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-Alcatel-9032Z
        path: twrp/out/target/product/9032Z/recovery.img
